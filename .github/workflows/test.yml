---
name: CI / Test
'on':
  pull_request:
  push:
    branches:
      - master

permissions:
  packages: read
  contents: read
  pull-requests: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/xdock-test

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: jest
        run: |
          npm test -- --json --outputFile=jest-results.json 2>&1 | tee jest-output.txt || true
          if [ -f jest-results.json ]; then
            PASSED=$(python3 -c "import json; d=json.load(open('jest-results.json')); print(d.get('numPassedTests',0))" 2>/dev/null || echo "0")
            FAILED=$(python3 -c "import json; d=json.load(open('jest-results.json')); print(d.get('numFailedTests',0))" 2>/dev/null || echo "0")
            TOTAL=$((PASSED + FAILED))
          else
            PASSED=$(grep -oP 'Tests:\s+\K\d+(?= passed)' jest-output.txt || echo "0")
            FAILED=$(grep -oP 'Tests:\s+.*\K\d+(?= failed)' jest-output.txt || echo "0")
            TOTAL=$((PASSED + FAILED))
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          COV="0"
          if [ -f coverage/coverage-summary.json ]; then
            COV=$(python3 -c "import json; d=json.load(open('coverage/coverage-summary.json')); print(round(d['total']['lines']['pct']))" 2>/dev/null || echo "0")
          fi
          echo "coverage=$COV" >> "$GITHUB_OUTPUT"
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Update unit test badge
        if: github.ref == 'refs/heads/master' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: xdock-unit-tests.json
          label: unit tests
          message: "${{ steps.jest.outputs.passed }}/${{ steps.jest.outputs.total }} passed"
          color: ${{ steps.jest.outputs.failed == '0' && 'brightgreen' || 'red' }}

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: xdock-coverage.json
          label: coverage
          message: "${{ steps.jest.outputs.coverage }}%"
          valColorRange: ${{ steps.jest.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100

  smoke-test:
    name: Smoke Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
          - fedora: '45'
            name: 'Fedora 45 / GNOME 51'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext
          npm install -g sass

      - name: Build extension zip
        run: make zip-file-nocheck

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull container image
        run: podman pull ${{ env.GHCR_IMAGE }}:f${{ matrix.fedora }}

      - name: Run smoke test
        run: |
          UUID="xdock@github.com"
          IMAGE="${{ env.GHCR_IMAGE }}:f${{ matrix.fedora }}"

          POD=$(podman run --rm --cap-add=SYS_ADMIN -td "$IMAGE")

          # Wait for systemd + D-Bus
          sleep 3
          for i in $(seq 1 10); do
            podman exec --user gnomeshell "$POD" true 2>/dev/null && break
            sleep 2
          done

          # Install extension
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          podman exec -u gnomeshell "${POD}" bash -c '
            mkdir -p ~/.local/share/gnome-shell/extensions/'"${UUID}"'
            cd ~/.local/share/gnome-shell/extensions/'"${UUID}"'
            unzip -qo ~/'"${UUID}"'.zip
          '

          # Start gnome-shell headless with extension enabled
          RESULT=$(podman exec -u gnomeshell \
            -e XDG_RUNTIME_DIR=/tmp/runtime-1000 \
            "${POD}" bash -c '
            mkdir -p /tmp/runtime-1000
            export LIBGL_ALWAYS_SOFTWARE=1
            timeout 30 dbus-run-session -- bash -c "
              dconf write /org/gnome/shell/enabled-extensions \"[\\\"'"${UUID}"'\\\"]\" 2>/dev/null
              gnome-shell --headless --no-x11 --virtual-monitor 1920x1080 2>&1
            "
          ' 2>&1 || true)

          # Check for extension errors (filter known non-issues)
          ERRORS=$(echo "$RESULT" \
            | grep -iE "xdock|${UUID}" \
            | grep -iE "error|syntaxerror|typeerror|referenceerror" \
            | grep -iv "logError\|CalendarServer\|Malcontent\|geolocation\|Auth\|record usage\|coverPane\|Brightness\|Could not\|colord\|GDM\|PolicyKit\|GeoClue\|suspend" \
            || true)

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ -n "$ERRORS" ]; then
            echo "::error::Extension errors detected:"
            echo "$ERRORS"
            exit 1
          fi
          echo "Smoke test passed — no extension errors"

  integration-test:
    name: Integration Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext
          npm install -g sass

      - name: Build extension zip
        run: make zip-file-nocheck

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull container image
        run: podman pull ${{ env.GHCR_IMAGE }}:f${{ matrix.fedora }}

      - name: Run integration tests
        run: |
          UUID="xdock@github.com"
          IMAGE="${{ env.GHCR_IMAGE }}:f${{ matrix.fedora }}"

          POD=$(podman run --rm --cap-add=SYS_ADMIN -td "$IMAGE")

          # Wait for systemd
          sleep 3
          for i in $(seq 1 10); do
            podman exec --user gnomeshell "$POD" true 2>/dev/null && break
            sleep 2
          done

          # Install extension into container
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/"
          podman exec -u gnomeshell "${POD}" bash -c '
            mkdir -p ~/.local/share/gnome-shell/extensions/'"${UUID}"'
            cd ~/.local/share/gnome-shell/extensions/'"${UUID}"'
            unzip -qo ~/'"${UUID}"'.zip
          '

          # Copy test runner (automation script must be on disk)
          podman exec "${POD}" mkdir -p /home/gnomeshell/test-integration
          podman cp test/integration/. "${POD}:/home/gnomeshell/test-integration/"
          podman exec "${POD}" chown -R gnomeshell:gnomeshell /home/gnomeshell

          # Run gnome-shell headless with automation script
          echo "=== Running integration tests ==="
          RESULT=$(podman exec -u gnomeshell \
            -e XDG_RUNTIME_DIR=/tmp/runtime-1000 \
            "${POD}" bash -c '
            mkdir -p /tmp/runtime-1000
            export LIBGL_ALWAYS_SOFTWARE=1
            export XDOCK_TEST_HOLD=0
            export XDOCK_TEST_SCREENSHOTS=1

            dbus-run-session -- bash -c "
              dconf write /org/gnome/shell/enabled-extensions \"[\\\"'"${UUID}"'\\\"]\" 2>/dev/null
              gnome-shell --headless --no-x11 --virtual-monitor 1920x1080 \
                --automation-script /home/gnomeshell/test-integration/runner.js 2>&1
            "
          ' 2>&1 || true)

          echo "=== Raw output (last 30 lines) ==="
          echo "$RESULT" | tail -30

          # Parse XDOCK-TEST results
          FILTERED=$(echo "$RESULT" | grep "XDOCK-TEST" || true)
          echo "=== Test summary ==="
          echo "$FILTERED" | grep -E "(Results:|--- |Extension)" || true

          RESULTS_LINE=$(echo "$FILTERED" | grep 'Results:' | tail -1 || echo "")
          PASSED=$(echo "$RESULTS_LINE" | grep -oP '\d+(?= passed)' || echo "0")
          FAILED=$(echo "$RESULTS_LINE" | grep -oP '\d+(?= failed)' || echo "0")
          TOTAL=$((PASSED + FAILED))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Copy screenshots
          mkdir -p screenshots
          podman cp "${POD}:/tmp/." screenshots/ 2>/dev/null || true
          ls screenshots/xdock-test-*.png 2>/dev/null | wc -l | xargs -I{} echo "{} screenshots captured"

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::Integration tests: $PASSED passed, $FAILED failed"
          elif [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No integration tests ran"
          else
            echo "Integration tests passed: $PASSED/$TOTAL"
          fi
        id: integration

      - name: Update integration test badge
        if: github.ref == 'refs/heads/master' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: xdock-integration-tests.json
          label: integration tests
          message: "${{ steps.integration.outputs.total == '0' && 'CI N/A (run locally)' || format('{0}/{1} passed', steps.integration.outputs.passed, steps.integration.outputs.total) }}"
          color: "${{ steps.integration.outputs.total == '0' && 'lightgrey' || (steps.integration.outputs.failed == '0' && 'brightgreen' || 'red') }}"

      - name: Visual regression comparison
        if: always()
        run: |
          sudo apt-get install -y -qq imagemagick bc 2>/dev/null || true
          mkdir -p diffs
          CHANGED=0
          for actual in screenshots/xdock-test-*.png; do
            [ -f "$actual" ] || continue
            name=$(basename "$actual")
            baseline="test/visual/baselines/$name"
            if [ ! -f "$baseline" ]; then
              echo "NEW: $name"
              cp "$actual" "diffs/${name%.png}_new.png"
              CHANGED=$((CHANGED + 1))
              continue
            fi
            RMSE=$(compare -metric RMSE "$baseline" "$actual" "diffs/${name%.png}_diff.png" 2>&1 | \
              grep -oP '\([\d.]+\)' | tr -d '()' || echo "999")
            RMSE_PCT=$(echo "$RMSE * 100" | bc -l 2>/dev/null || echo "999")
            if (( $(echo "$RMSE_PCT <= 1.0" | bc -l 2>/dev/null || echo 0) )); then
              rm -f "diffs/${name%.png}_diff.png"
            else
              echo "CHANGED: $name (RMSE: ${RMSE_PCT}%)"
              cp "$baseline" "diffs/${name%.png}_baseline.png"
              cp "$actual" "diffs/${name%.png}_actual.png"
              CHANGED=$((CHANGED + 1))
            fi
          done
          echo "visual_changes=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" -gt 0 ]; then
            echo "::warning::$CHANGED visual differences detected"
          else
            echo "All screenshots match baselines"
          fi
        id: visual

      - name: Upload visual diffs (only if changed)
        if: always() && steps.visual.outputs.visual_changes != '0'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-f${{ matrix.fedora }}
          path: diffs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR with visual changes
        if: github.event_name == 'pull_request' && steps.visual.outputs.visual_changes != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const changes = '${{ steps.visual.outputs.visual_changes }}';
            const body = `## Visual Regression Report

            **${changes} screenshot(s) differ from baselines.**

            Download the \`visual-regression-diffs\` artifact to see:
            - \`*_baseline.png\` — expected (from \`test/visual/baselines/\`)
            - \`*_actual.png\` — what the PR produces
            - \`*_diff.png\` — highlighted differences

            **To update baselines** (if the changes are intentional):
            \`\`\`bash
            make update-baselines
            git add test/visual/baselines/
            git commit -m "Update visual baselines"
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
