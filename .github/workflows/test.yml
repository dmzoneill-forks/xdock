---
name: CI / Test
'on':
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: jest
        run: |
          npm test -- --json --outputFile=jest-results.json 2>&1 | tee jest-output.txt || true
          if [ -f jest-results.json ]; then
            PASSED=$(python3 -c "import json; d=json.load(open('jest-results.json')); print(d.get('numPassedTests',0))" 2>/dev/null || echo "0")
            FAILED=$(python3 -c "import json; d=json.load(open('jest-results.json')); print(d.get('numFailedTests',0))" 2>/dev/null || echo "0")
            TOTAL=$((PASSED + FAILED))
          else
            PASSED=$(grep -oP 'Tests:\s+\K\d+(?= passed)' jest-output.txt || echo "0")
            FAILED=$(grep -oP 'Tests:\s+.*\K\d+(?= failed)' jest-output.txt || echo "0")
            TOTAL=$((PASSED + FAILED))
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Update unit test badge
        if: github.ref == 'refs/heads/master' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: xdock-unit-tests.json
          label: unit tests
          message: "${{ steps.jest.outputs.passed }}/${{ steps.jest.outputs.total }} passed"
          color: ${{ steps.jest.outputs.failed == '0' && 'brightgreen' || 'red' }}

  build-container:
    name: Build Container (${{ matrix.name }})
    uses: ./.github/workflows/build-container.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora_version: '44'
            name: 'Fedora 44'
          - fedora_version: '45'
            name: 'Fedora 45'
    with:
      fedora_version: ${{ matrix.fedora_version }}

  smoke-test:
    name: Smoke Test (${{ matrix.name }})
    needs: build-container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
          - fedora: '45'
            name: 'Fedora 45 / GNOME 51'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext
          npm install -g sass

      - name: Build extension zip
        run: make zip-file-nocheck

      - name: Download container image
        uses: actions/download-artifact@v4
        with:
          name: container-f${{ matrix.fedora }}

      - name: Load container image
        run: podman load -i xdock-test-f${{ matrix.fedora }}.tar

      - name: Run smoke test
        run: |
          UUID="xdock@github.com"

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK --cap-add=SYS_ADMIN -td xdock-test:f${{ matrix.fedora }})

          # Wait for container D-Bus
          sleep 3
          for i in $(seq 1 10); do
            do_in_pod true 2>/dev/null && break
            sleep 2
          done

          # Install and enable extension
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          do_in_pod gnome-extensions install "${UUID}.zip" || true

          # Start gnome-shell headless and enable extension
          podman exec -d --user gnomeshell "${POD}" bash -c '
            export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
            export LIBGL_ALWAYS_SOFTWARE=1
            gnome-shell --headless --virtual-monitor 1920x1080 &
            sleep 10
            gnome-extensions enable '"${UUID}"' 2>/dev/null || true
            sleep 5
          '
          sleep 20

          # Check for errors
          ERRORS=$(podman exec "${POD}" journalctl --user -b 2>/dev/null \
              | grep -i "xdock\|${UUID}" \
              | grep -iE "error|syntaxerror|typeerror|referenceerror|failed" \
              | grep -iv "logError\|CalendarServer\|Malcontent\|geolocation\|Auth\|record usage\|coverPane\|Brightness\|Could not" \
              || true)

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ -n "$ERRORS" ]; then
            echo "::error::Extension errors detected:"
            echo "$ERRORS"
            exit 1
          fi

          echo "Smoke test passed — no errors detected"

  integration-test:
    name: Integration Tests (${{ matrix.name }})
    needs: build-container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext
          npm install -g sass

      - name: Download container image
        uses: actions/download-artifact@v4
        with:
          name: container-f${{ matrix.fedora }}

      - name: Load container image
        run: podman load -i xdock-test-f${{ matrix.fedora }}.tar

      - name: Build extension zip
        run: make zip-file-nocheck

      - name: Run integration tests
        run: |
          UUID="xdock@github.com"

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK --cap-add=SYS_ADMIN -td xdock-test:f${{ matrix.fedora }})

          sleep 3
          for i in $(seq 1 10); do
            do_in_pod true 2>/dev/null && break
            sleep 2
          done

          # Copy and install extension (test files are included in the zip)
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          do_in_pod gnome-extensions install "${UUID}.zip" || true

          # Run integration tests headless
          RESULT=$(podman exec --user gnomeshell "${POD}" bash -c '
            export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
            export LIBGL_ALWAYS_SOFTWARE=1
            export XDOCK_TEST_HOLD=0
            export XDOCK_TEST_SCREENSHOTS=1
            rm -f /run/user/$(id -u)/gnome-shell-disable-extensions
            dbus-run-session -- gnome-shell-test-tool --headless \
              --extension xdock@github.com.zip \
              /home/gnomeshell/test/integration/runner.js 2>&1 \
              | grep "XDOCK-TEST"
          ' 2>&1 || true)

          echo "$RESULT"

          # Parse test counts from "Results: X passed, Y failed"
          RESULTS_LINE=$(echo "$RESULT" | grep 'Results:' || echo "")
          PASSED=$(echo "$RESULTS_LINE" | grep -oP '\d+(?= passed)' || echo "0")
          FAILED=$(echo "$RESULTS_LINE" | grep -oP '\d+(?= failed)' || echo "0")
          TOTAL=$((PASSED + FAILED))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Copy screenshots out
          mkdir -p screenshots
          podman cp "${POD}:/tmp/." screenshots/ 2>/dev/null || true
          ls screenshots/xdock-test-*.png 2>/dev/null | wc -l | xargs -I{} echo "{} screenshots captured"

          podman stop "${POD}" >/dev/null 2>&1 || true

          # Check for test failures
          if echo "$RESULT" | grep -q "SOME TESTS FAILED"; then
            echo "::error::Integration tests failed"
            echo "$RESULT" | grep "FAIL:"
            exit 1
          fi

          echo "Integration tests passed"
        id: integration

      - name: Update integration test badge
        if: github.ref == 'refs/heads/master' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: xdock-integration-tests.json
          label: integration tests
          message: "${{ steps.integration.outputs.passed }}/${{ steps.integration.outputs.total }} passed"
          color: ${{ steps.integration.outputs.failed == '0' && 'brightgreen' || 'red' }}

      - name: Visual regression comparison
        if: always()
        run: |
          sudo apt-get install -y -qq imagemagick bc 2>/dev/null || true
          mkdir -p diffs
          CHANGED=0
          for actual in screenshots/xdock-test-*.png; do
            [ -f "$actual" ] || continue
            name=$(basename "$actual")
            baseline="test/visual/baselines/$name"
            if [ ! -f "$baseline" ]; then
              echo "NEW: $name"
              cp "$actual" "diffs/${name%.png}_new.png"
              CHANGED=$((CHANGED + 1))
              continue
            fi
            RMSE=$(compare -metric RMSE "$baseline" "$actual" "diffs/${name%.png}_diff.png" 2>&1 | \
              grep -oP '\([\d.]+\)' | tr -d '()' || echo "999")
            RMSE_PCT=$(echo "$RMSE * 100" | bc -l 2>/dev/null || echo "999")
            if (( $(echo "$RMSE_PCT <= 1.0" | bc -l 2>/dev/null || echo 0) )); then
              rm -f "diffs/${name%.png}_diff.png"
            else
              echo "CHANGED: $name (RMSE: ${RMSE_PCT}%)"
              cp "$baseline" "diffs/${name%.png}_baseline.png"
              cp "$actual" "diffs/${name%.png}_actual.png"
              CHANGED=$((CHANGED + 1))
            fi
          done
          echo "visual_changes=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" -gt 0 ]; then
            echo "::warning::$CHANGED visual differences detected"
          else
            echo "All screenshots match baselines"
          fi
        id: visual

      - name: Upload visual diffs (only if changed)
        if: always() && steps.visual.outputs.visual_changes != '0'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-f${{ matrix.fedora }}
          path: diffs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR with visual changes
        if: github.event_name == 'pull_request' && steps.visual.outputs.visual_changes != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const changes = '${{ steps.visual.outputs.visual_changes }}';
            const body = `## Visual Regression Report

            **${changes} screenshot(s) differ from baselines.**

            Download the \`visual-regression-diffs\` artifact to see:
            - \`*_baseline.png\` — expected (from \`test/visual/baselines/\`)
            - \`*_actual.png\` — what the PR produces
            - \`*_diff.png\` — highlighted differences

            **To update baselines** (if the changes are intentional):
            \`\`\`bash
            make update-baselines
            git add test/visual/baselines/
            git commit -m "Update visual baselines"
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
