---
name: CI / Build
'on':
  pull_request:
  push:
    branches:
      - master
      - ubuntu-dock
      - make_ci

jobs:
  make:
    name: Make
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies.
        run: |
          sudo apt-get install -y gettext
          npm install -g sass

      - name: Make
        run: make

      - name: Install modules
        run: sudo npm install eslint@9.x -g

      - name: Make Check
        run: make check

      - name: Make Install
        run: make install

      - name: Generate translations
        run: make potfile
