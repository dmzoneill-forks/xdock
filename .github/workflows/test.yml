---
name: Test
'on':
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  smoke-test:
    name: Smoke Test (GNOME ${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '41'
          - 'rawhide'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext imagemagick podman

      - name: Build extension zip
        run: |
          if command -v sassc &>/dev/null || command -v sass &>/dev/null; then
            make zip 2>/dev/null || true
          fi
          if [ ! -f "xdock@github.com.zip" ]; then
            zip -r "xdock@github.com.zip" . \
              -x '.git/*' 'node_modules/*' 'venv/*' '.claude/*' 'coverage/*' \
              'test/*' '_build/*' '*.zip' 'lint/*' '.github/*'
          fi

      - name: Run smoke test
        run: |
          IMAGE="ghcr.io/schneegans/gnome-shell-pod-${{ matrix.version }}"
          UUID="xdock@github.com"

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          echo "Pulling $IMAGE..."
          podman pull "$IMAGE"

          echo "Starting container..."
          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK -td "$IMAGE")

          echo "Waiting for D-Bus..."
          do_in_pod wait-user-bus.sh

          echo "Installing extension..."
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          do_in_pod gnome-extensions install --force "/home/gnomeshell/${UUID}.zip"

          echo "Starting GNOME Shell..."
          do_in_pod systemctl --user start "gnome-xsession@:99" || true
          sleep 5

          echo "Enabling extension..."
          do_in_pod gnome-extensions enable "$UUID" || true
          sleep 3

          echo "Checking extension state..."
          STATE=$(do_in_pod gnome-extensions info "$UUID" 2>/dev/null || echo "not found")
          echo "$STATE"

          echo "Checking for errors..."
          ERRORS=$(podman exec "${POD}" journalctl --user -b \
              | grep -i "xdock\|${UUID}" \
              | grep -iE "error|syntaxerror|typeerror|referenceerror|failed" \
              | grep -iv "logError\|CalendarServer\|Malcontent\|geolocation\|Auth\|record usage\|coverPane" \
              || true)

          echo "Taking screenshot..."
          podman cp "${POD}:/opt/Xvfb_screen0" Xvfb_screen0 2>/dev/null || true
          if [ -f Xvfb_screen0 ]; then
            convert xwd:Xvfb_screen0 screenshot.png 2>/dev/null || true
          fi

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ -n "$ERRORS" ]; then
            echo "::error::Extension errors detected:"
            echo "$ERRORS"
            exit 1
          fi

          echo "Smoke test passed"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-gnome-${{ matrix.version }}
          path: screenshot.png
          if-no-files-found: ignore
