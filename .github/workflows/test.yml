---
name: Test
'on':
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
