---
name: CI / Test
'on':
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  smoke-test:
    name: Smoke Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '43'
            name: 'Fedora 43 / GNOME 49'
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gettext

      - name: Build test container
        run: |
          podman build \
            --build-arg=fedora_version=${{ matrix.fedora }} \
            -t xdock-test:f${{ matrix.fedora }} \
            test/container/

      - name: Build extension zip
        run: |
          if [ ! -f "xdock@github.com.zip" ]; then
            zip -r "xdock@github.com.zip" . \
              -x '.git/*' 'node_modules/*' 'venv/*' '.claude/*' 'coverage/*' \
              'test/*' '_build/*' '*.zip' 'lint/*' '.github/*'
          fi

      - name: Run smoke test
        run: |
          UUID="xdock@github.com"

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK --cap-add=SYS_ADMIN -td xdock-test:f${{ matrix.fedora }})

          # Wait for container D-Bus
          sleep 3
          for i in $(seq 1 10); do
            do_in_pod true 2>/dev/null && break
            sleep 2
          done

          # Install and enable extension
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          do_in_pod gnome-extensions install "${UUID}.zip" || true

          # Start gnome-shell headless and enable extension
          podman exec -d --user gnomeshell "${POD}" bash -c '
            export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
            export LIBGL_ALWAYS_SOFTWARE=1
            gnome-shell --headless --no-x11 --virtual-monitor 1920x1080 &
            sleep 10
            gnome-extensions enable '"${UUID}"' 2>/dev/null || true
            sleep 5
          '
          sleep 20

          # Check for errors
          ERRORS=$(podman exec "${POD}" journalctl --user -b 2>/dev/null \
              | grep -i "xdock\|${UUID}" \
              | grep -iE "error|syntaxerror|typeerror|referenceerror|failed" \
              | grep -iv "logError\|CalendarServer\|Malcontent\|geolocation\|Auth\|record usage\|coverPane\|Brightness\|Could not" \
              || true)

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ -n "$ERRORS" ]; then
            echo "::error::Extension errors detected:"
            echo "$ERRORS"
            exit 1
          fi

          echo "Smoke test passed — no errors detected"

  integration-test:
    name: Integration Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gettext

      - name: Build test container
        run: |
          podman build \
            --build-arg=fedora_version=${{ matrix.fedora }} \
            -t xdock-test:f${{ matrix.fedora }} \
            test/container/

      - name: Build extension zip
        run: |
          UUID="xdock@github.com"
          zip -r "${UUID}.zip" . \
            -x '.git/*' 'node_modules/*' 'venv/*' '.claude/*' 'coverage/*' \
            '_build/*' '*.zip' 'lint/*' '.github/*'

      - name: Run integration tests
        run: |
          UUID="xdock@github.com"

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK --cap-add=SYS_ADMIN -td xdock-test:f${{ matrix.fedora }})

          sleep 3
          for i in $(seq 1 10); do
            do_in_pod true 2>/dev/null && break
            sleep 2
          done

          # Copy extension and test runner
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"
          podman cp test/integration "${POD}:/home/gnomeshell/test/integration"
          podman cp test/smoke "${POD}:/home/gnomeshell/test/smoke"

          # Install extension
          do_in_pod gnome-extensions install "${UUID}.zip" || true

          # Run integration tests headless
          RESULT=$(podman exec --user gnomeshell "${POD}" bash -c '
            export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
            export LIBGL_ALWAYS_SOFTWARE=1
            export XDOCK_TEST_HOLD=0
            export XDOCK_TEST_SCREENSHOTS=1
            rm -f /run/user/$(id -u)/gnome-shell-disable-extensions
            dbus-run-session -- gnome-shell-test-tool --headless \
              --extension xdock@github.com.zip \
              /home/gnomeshell/test/integration/runner.js 2>&1 \
              | grep "XDOCK-TEST"
          ' 2>&1 || true)

          echo "$RESULT"

          # Copy screenshots out
          mkdir -p screenshots
          podman cp "${POD}:/tmp/." screenshots/ 2>/dev/null || true
          ls screenshots/xdock-test-*.png 2>/dev/null | wc -l | xargs -I{} echo "{} screenshots captured"

          podman stop "${POD}" >/dev/null 2>&1 || true

          # Check for failures
          if echo "$RESULT" | grep -q "SOME TESTS FAILED"; then
            echo "::error::Integration tests failed"
            echo "$RESULT" | grep "FAIL:"
            exit 1
          fi

          echo "Integration tests passed"

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-f${{ matrix.fedora }}
          path: screenshots/xdock-test-*.png
          if-no-files-found: ignore
          retention-days: 7
