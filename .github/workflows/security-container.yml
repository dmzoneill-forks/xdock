---
name: Security / Container
'on':
  push:
    branches: [master]
    paths:
      - 'test/container/**'
  pull_request:
    branches: [master]
    paths:
      - 'test/container/**'
  schedule:
    - cron: '0 8 * * 1'

jobs:
  build-container:
    name: Build Container (${{ matrix.name }})
    uses: ./.github/workflows/build-container.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora_version: '44'
            name: 'Fedora 44'
          - fedora_version: '45'
            name: 'Fedora 45'
    with:
      fedora_version: ${{ matrix.fedora_version }}

  trivy:
    name: Trivy (${{ matrix.name }})
    needs: build-container
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '44'
            name: 'Fedora 44'
          - fedora: '45'
            name: 'Fedora 45'
    steps:
      - name: Download container image
        uses: actions/download-artifact@v4
        with:
          name: container-f${{ matrix.fedora }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: xdock-test-f${{ matrix.fedora }}.tar
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
