---
name: Build Test Container
'on':
  push:
    branches: [master]
    paths:
      - 'test/container/**'
  workflow_dispatch:
    inputs:
      fedora_version:
        description: 'Fedora version to build'
        required: false
        default: '44'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/xdock-test

permissions:
  packages: write

jobs:
  build:
    name: Build & Push (${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora_version: ['44', '45']
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        run: |
          podman build \
            --build-arg=fedora_version=${{ matrix.fedora_version }} \
            -t ${{ env.IMAGE_BASE }}:f${{ matrix.fedora_version }} \
            test/container/

      - name: Push to GHCR
        run: |
          podman push ${{ env.IMAGE_BASE }}:f${{ matrix.fedora_version }}
