---
name: Test
'on':
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  smoke-test:
    name: Smoke Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '41'
            name: 'Fedora 41 / GNOME 47'
            image: 'ghcr.io/schneegans/gnome-shell-pod-41'
            custom: false
          - fedora: '42'
            name: 'Fedora 42 / GNOME 48'
            image: ''
            custom: true
          - fedora: '43'
            name: 'Fedora 43 / GNOME 49'
            image: ''
            custom: true
          - fedora: '44'
            name: 'Fedora 44 / GNOME 50'
            image: ''
            custom: true
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext imagemagick

      - name: Build test container (custom)
        if: matrix.custom
        run: |
          podman build \
            --build-arg=fedora_version=${{ matrix.fedora }} \
            -t xdock-test:f${{ matrix.fedora }} \
            test/container/

      - name: Pull test container (Schneegans)
        if: ${{ !matrix.custom }}
        run: podman pull ${{ matrix.image }}

      - name: Build extension zip
        run: |
          if command -v sass &>/dev/null || command -v sassc &>/dev/null; then
            make zip 2>/dev/null || true
          fi
          if [ ! -f "xdock@github.com.zip" ]; then
            zip -r "xdock@github.com.zip" . \
              -x '.git/*' 'node_modules/*' 'venv/*' '.claude/*' 'coverage/*' \
              'test/*' '_build/*' '*.zip' 'lint/*' '.github/*'
          fi

      - name: Run smoke test
        run: |
          UUID="xdock@github.com"
          if [ "${{ matrix.custom }}" = "true" ]; then
            IMG="xdock-test:f${{ matrix.fedora }}"
          else
            IMG="${{ matrix.image }}"
          fi

          do_in_pod() {
            podman exec --user gnomeshell --workdir /home/gnomeshell "${POD}" set-env.sh "$@"
          }

          echo "Starting container ($IMG)..."
          POD=$(podman run --rm --cap-add=SYS_NICE --cap-add=IPC_LOCK -td "$IMG")

          echo "Installing extension..."
          podman cp "${UUID}.zip" "${POD}:/home/gnomeshell/${UUID}.zip"

          echo "Waiting for user bus..."
          for i in $(seq 1 30); do
            if do_in_pod gnome-extensions install "${UUID}.zip" 2>/dev/null; then
              echo "  bus ready after $((i * 2))s"
              break
            fi
            sleep 2
          done

          echo "Disabling welcome tour..."
          do_in_pod gsettings set org.gnome.shell welcome-dialog-last-shown-version "999" || true

          echo "Starting GNOME Shell..."
          # Try X11 session first (Fedora 41), then headless Wayland (42+)
          if do_in_pod systemctl --user start "gnome-xsession@:99" 2>/dev/null; then
            echo "  X11 session started"
          elif do_in_pod start-gnome-headless.sh 1920x1080 2>/dev/null; then
            echo "  Headless Wayland session started"
          else
            echo "  Warning: could not start GNOME session"
          fi
          sleep 10

          echo "Enabling extension..."
          do_in_pod gnome-extensions enable "$UUID" || true
          sleep 5

          echo "Closing overview..."
          do_in_pod xdotool key super || true
          sleep 3

          echo "GNOME Shell version:"
          do_in_pod gnome-shell --version || true

          echo "Checking extension state..."
          do_in_pod gnome-extensions info "$UUID" || true

          echo "Checking for errors..."
          ERRORS=$(podman exec "${POD}" journalctl --user -b \
              | grep -i "xdock\|${UUID}" \
              | grep -iE "error|syntaxerror|typeerror|referenceerror|failed" \
              | grep -iv "logError\|CalendarServer\|Malcontent\|geolocation\|Auth\|record usage\|coverPane\|Brightness" \
              || true)

          echo "Taking screenshot..."
          # Method 1: D-Bus Screenshot API (headless Wayland)
          do_in_pod take-screenshot.sh /tmp/screenshot.png 2>/dev/null || true
          podman cp "${POD}:/tmp/screenshot.png" screenshot.png 2>/dev/null || true

          # Method 2: Xvfb framebuffer (X11 sessions)
          if [ ! -f screenshot.png ] || [ "$(stat -c%s screenshot.png 2>/dev/null || echo 0)" -lt 1000 ]; then
            podman cp "${POD}:/opt/Xvfb_screen0" - 2>/dev/null | tar xf - 2>/dev/null || true
            if [ -f Xvfb_screen0 ] && [ "$(stat -c%s Xvfb_screen0 2>/dev/null || echo 0)" -gt 10000 ]; then
              convert xwd:Xvfb_screen0 screenshot.png 2>/dev/null || true
            fi
          fi

          SIZE=$(stat -c%s screenshot.png 2>/dev/null || echo 0)
          echo "Screenshot: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "Warning: screenshot may be blank"
          fi

          podman stop "${POD}" >/dev/null 2>&1 || true

          if [ -n "$ERRORS" ]; then
            echo "::error::Extension errors detected:"
            echo "$ERRORS"
            exit 1
          fi

          echo "Smoke test passed"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-fedora-${{ matrix.fedora }}
          path: screenshot.png
          if-no-files-found: ignore
